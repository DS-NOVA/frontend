<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Nova</title>
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="stylesheet" href="../css/login.css" />
        <link rel="stylesheet" href="../css/toast.css" />
        <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
    </head>

    <body>
        <div class="login-background">
        <svg width="12383" height="6857" viewBox="0 0 12383 6857" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <path d="M3935 6699C2802.77 6699 672.167 5639.67 25.5 5131.5V-54.5H12426C12518.3 2089.83 12647.6 6373.9 12426 6355.5C11987.5 6078.5 10719 4762 9171.5 4762C7624 4762 5819.5 6699 3935 6699Z" fill="url(#paint0_linear_277_4)" fill-opacity="0.2"/>
            <path d="M2021.5 6856.53C889.266 6856.53 -326.833 5802.67 -973.5 5294.5L0 -55H12400.5C12492.8 2089.33 13885.1 6484.9 13663.5 6466.5C13225 6189.5 11174 4825.03 9626.5 4825.03C8079 4825.03 4027 6856.53 2021.5 6856.53Z" fill="url(#paint1_linear_277_4)" fill-opacity="0.2"/>
            <defs>
            <linearGradient id="paint0_linear_277_4" x1="6298.78" y1="-54.5" x2="6298.78" y2="6699" gradientUnits="userSpaceOnUse">
            <stop offset="0.9999" stop-color="#5287EA"/>
            </linearGradient>
            <linearGradient id="paint1_linear_277_4" x1="6273.28" y1="-55" x2="6273.28" y2="6698.5" gradientUnits="userSpaceOnUse">

        </svg>
        </div>

        <main class="login-content">
            <img src="../img/logo.svg" id="login-logo"/>

            <form class="login-form">
                <h1>로그인</h1>

                <input type="email" placeholder="이메일" required id="email" />
                <input type="password" placeholder="비밀번호" minlength=6 required id="password" />
                <p class="signup-link" style="font-size: 18px;">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
                
                <button type="submit" id="login-btn">로그인</button>

            </form>
        </main>
        <script type="module" src="../js/toast.js"></script>
        <script type="module" src="../js/login.js"></script>

    </body>

</html>
