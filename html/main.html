<!DOCTYPE html>
<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nova</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/nav.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
  </head>

  <body>
    <div class="main-background">
    <svg width="12383" height="6857" viewBox="0 0 12383 6857" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M2021.5 6856.53C889.266 6856.53 -326.833 5802.67 -973.5 5294.5L0 -55H12400.5C12492.8 2089.33 13885.1 6484.9 13663.5 6466.5C13225 6189.5 11174 4825.03 9626.5 4825.03C8079 4825.03 4027 6856.53 2021.5 6856.53Z" fill="#ECF3FF"/>

    </div>

      <div id="nav"></div>
    </header>
    
    <main class="main-content">
      <h1>광과민성 장면 검출 테스터</h1>
      <h3>
        NOVA에서는 영상 속 민감한 장면을 검출하고 변환하는 기능을 제공하여,<br>
        모두가 편하게 영상을 시청할 수 있도록 하는 것이 목적입니다.
          <br>
          <br>
        아래 버튼을 눌러 서비스를 이용해보세요!
      </h3>

      <div class="main-btn">
        <!--페이지 이동-->
        <button id="main-log-in" type="button">
          로그인
        </button>
        <button id="main-dashboard" type="button">
          시작하기
        </button>
      </div>
    </main>

    <script src="../js/main.js"></script>
