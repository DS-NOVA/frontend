<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nova</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/nav.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
  </head>
  <body>

     <nav class="navbar">
    <svg class="nav-background" viewBox="0 0 12383 1583" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M2021.19 1583C888.884 1583 -327.292 1333.24 -974 1212.81L-0.438171 -55H12400.8C12493.2 453.197 13885.5 1494.93 13663.9 1490.57C13225.4 1424.92 11174.3 1101.54 9626.67 1101.54C8079.08 1101.54 4026.82 1583 2021.19 1583Z" fill="#ECF3FF"></path>
    </svg>
    <div class="nav-content">
      <div class="nav-left">
        <img src="../img/logo.svg" alt="로고" class="nav_logo" />
      </div>
      <div class="nav-right">
        <div class="non-user-profile" style="display: none;">
          <span id="nav-sign-up" type="button">Sign up</span>
          <span id="nav-log-in" type="button">Log in</span>
        </div>
        <div class="user-profile" style="display: flex; align-items: center; gap: 10px;">
          <span id="user-id">duksung@gmail.com</span>
          <img src="../img/user_img.png" class="user_img" />
        </div>
      </div>
    </div>
  </nav>

    
    <main class="main-content">

      <!-- 영상 업로드 영역 -->
      <section class="upload">

        <input type="file" id="videoInput" name="video" accept="video/*" style="display: none;" />
        <button id="dashboard-upload" type="button">
          <img src="../img/file_img.svg" alt="파일이미지" class="file_img" />
          select a file to upload
        </button>
        <div class="upload-right">
          <button id="dashboard-play" type="button">PLAY</button>
          <button id="dashboard-save" type="button">SAVE</button>
        </div>
      </section>

      <section class="video">

        <!-- 변환 전 영상이 보여지는 영역 -->
        <div class="input">
          <small>영상 변환 전</small>
          <video id="inputVideo" width="100%" height="450" muted controls></video>
        </div>

        <!-- 변환 후 영상이 보여지는 영역 -->
        <div class="output">
          <small>영상 변환 후</small>
          <div class="videoWrapper">
            <div class="ui-overlay">
              <div class="timeline-tooltip" id="timelineTooltip">
                <div class="tooltip-content">
                    <div class="tooltip-title">오버레이 효과</div>
                    <div class="tooltip-time">시간: <span id="tooltipTime"></span></div>
                    <div class="tooltip-desc">패턴 오버레이</div>
                </div>
              </div>
              <div class="timeline-container">
                <div class="timeline-bar" id="overlayTimeline"></div>
              </div>
              <button id="pauseBtn">⏸ Pause</button>
            </div>
            
            <video id="overlayVideo" width="100%" height="450" style="opacity: 0;" muted autoplay playsinline></video>
            <video id="outputVideo" width="100%" height="450" muted autoplay playsinline></video>
          </div>
          </div>
        
      </section>
      

    </main>

    <script src="../js/dashboard.js"></script>
    <script src="../js/nav.js"></script>
  </body>
</html>
