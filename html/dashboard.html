<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nova</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/nav.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
  </head>
  <body>
    <header>
      <div id="nav"></div>
    </header>

    <main class="main-content">
      <!-- 영상 업로드 영역 -->
      <section class="upload">
        <input type="file" id="videoInput" name="video" accept="video/*" style="display: none;" />
        <button id="dashboard-upload" type="button">
          <img src="../img/file_img.svg" alt="파일이미지" class="file_img" />
          select a file to upload
        </button>
        
        <div class="controls-container">
          <div class="slider-item">
            <label for="brightness">밝기 강도: <span id="brightnessVal">0.25</span></label>
            <input type="range" id="brightness" min="0" max="1" step="0.25" value="0.25" />
          </div>
          <div class="slider-item">
            <label for="saturation">채도 강도: <span id="saturationVal">0.25</span></label>
            <input type="range" id="saturation" min="0" max="1" step="0.25" value="0.25" />
          </div>
          <div class="button-item">
            <button id="dashboard-play">PLAY</button>
            <button id="dashboard-save">SAVE</button>
          </div>
        </div>
      </section>

      <div class="content-wrapper">
        <div class="guidelines-section">
          <h2 class="guidelines-title">Guidelines</h2>
          <ul class="guidelines-list">
            <li class="guidelines-item" data-guideline="flash-speed">
              <img id="flash-icon" class="icon-img" hidden alt="" />
              <span class="guidelines-text">휘도차 20cd/m² 이상 면적이 큰 섬광</span>
            </li>
            <li class="guidelines-item" data-guideline="green-blink">
              <img id="redlight-icon" class="icon-img" hidden alt="" />
              <span class="guidelines-text">초당 3회 이상·적색 비율 0.8 이상<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;변화량 20 이상 적색 섬광 금지</span>
            </li>
            <li class="guidelines-item" data-guideline="pattern-change">
              <img id="pattern-icon" class="icon-img" hidden alt="" />
              <span class="guidelines-text">밝고 어두운 줄무늬 5쌍 이상</span>
            </li>
          </ul>
        </div>

        <div class="video-section">
          <!-- 변환 전 영상 -->
          <div class="input">
            <small>영상 변환 전</small>
            <div class="videoWrapper">
              <video id="inputVideo" width="100%" height="450" muted autoplay playsinline></video>
            </div>
            <!-- 입력 타임라인(오버레이 없이) -->
            <div class="timeline-container" id="inputTimelineHost"></div>
          </div>

          <!-- 변환 후 영상 -->
          <div class="output">
            <small>영상 변환 후</small>
            <div class="videoWrapper">
              <!-- 오버레이는 제거하여 타임라인 클릭 방해 요소 해소 -->
              <video id="overlayVideo" width="100%" height="450" style="opacity: 0;" muted autoplay playsinline></video>
              <video id="outputVideo" width="100%" height="450" muted autoplay playsinline></video>
            </div>
            <!-- 출력 타임라인(오버레이 + 툴팁 동작) -->
            <div class="timeline-container" id="outputTimelineHost">
              <div class="timeline-tooltip" id="timelineTooltip">
                <div class="tooltip-content">
                  <div class="tooltip-title">오버레이 효과</div>
                  <div class="tooltip-time">시간: <span id="tooltipTime"></span></div>
                  <div class="tooltip-desc">패턴 오버레이</div>
                </div>
              </div>
            </div>
          </div>
        </div> <!-- /video-section -->
      </div>

      <section class="graph">
        <div id="graph-container">
          <div id="graph" style="width: 100%;"></div>
        </div>
      </section>
    </main>

    <div id="detect-splash" class="detect-splash" aria-live="polite" aria-busy="true" hidden>
      <div class="detect-splash__box">
        <div class="spinner-container">
          <div class="spinner-line"></div>
          <div class="spinner-line"></div>
          <div class="spinner-line"></div>
          <div class="spinner-line"></div>
          <div class="spinner-line"></div>
          <div class="spinner-line"></div>
          <div class="spinner-line"></div>
          <div class="spinner-line"></div>
        </div>
        <div class="detect-splash__text">검출 중</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script type="module" src="../js/auth_dashboard.js"></script>
    <script type="module" src="../js/nav.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
  </body>
</html>
